<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}AI News Portal{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/custom.css" />
  </head>
  <body class="site-shell min-h-screen text-slate-900 antialiased">
    <div class="flex min-h-screen flex-col">
      <header class="site-header border-b border-slate-300/70 bg-white/95 shadow-sm backdrop-blur">
        <div class="site-container mx-auto w-full max-w-7xl px-4 py-5 sm:px-6">
          <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <a href="/" class="site-brand flex items-center gap-2 text-2xl font-extrabold tracking-tight text-slate-900">Plutonia AI Newsroom</a>
            <nav class="flex flex-wrap items-center gap-2 text-sm font-medium">
              <a class="nav-pill {% if request.path == '/' %}is-active{% endif %}" href="/">Latest</a>
              <a class="nav-pill {% if request.path == '/favorites/' %}is-active{% endif %}" href="/favorites/">Trending</a>
              <a class="nav-pill {% if request.path == '/categories/' %}is-active{% endif %}" href="/categories/">All</a>
              <a class="nav-pill {% if request.path|slice:':11' == '/resources/' %}is-active{% endif %}" href="/resources/">Resources</a>
              <a class="nav-ghost" href="/dashboard/">Dashboard</a>
              <a class="nav-ghost" href="/admin/">Admin</a>
            </nav>
          </div>
          <form action="/search/" method="get" class="header-search mt-4 flex gap-2">
            <input name="q" placeholder="Search headlines, sources, topics..." class="w-full rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100" />
            <button class="rounded-xl bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-800" type="submit">Search</button>
          </form>
        </div>
      </header>

      <main class="site-container mx-auto w-full max-w-7xl flex-1 px-4 py-8 sm:px-6">
        {% block content %}{% endblock %}
      </main>

      <footer class="site-footer border-t border-slate-300/70 bg-white/95 py-6 text-center text-sm text-slate-500">
        © 2026 Plutonia AI Newsroom
      </footer>
    </div>

    <script src="/static/js/app.js"></script>
  </body>
</html>
