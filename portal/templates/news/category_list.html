{% extends "base.html" %}
{% block title %}Categories · AI News Portal{% endblock %}
{% block content %}
<section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
  <h1 class="mb-4 text-2xl font-bold text-slate-900">Categories</h1>
  <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
    {% for c in categories %}
      <a href="/category/{{ c.slug }}/" class="rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 transition hover:border-blue-400 hover:bg-blue-50">
        <span class="font-semibold text-slate-800">{{ c.name }}</span>
        <span class="ml-2 text-xs text-slate-500">{{ c.article_count }}</span>
      </a>
    {% empty %}
      <p class="text-sm text-slate-500">No categories yet.</p>
    {% endfor %}
  </div>
</section>
{% endblock %}
