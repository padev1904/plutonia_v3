name: plutonia-ainews

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: plutonia-postgres-1
    restart: unless-stopped
    environment:
      POSTGRES_DB: plutonia
      POSTGRES_USER: python
      POSTGRES_PASSWORD: ${PLUTONIA_DB_PASSWORD:-}
    volumes:
      - /var/lib/plutonia/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U python -d plutonia"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ainews-net

  ollama:
    image: ollama/ollama:latest
    container_name: plutonia-ollama-1
    restart: unless-stopped
    gpus: all
    environment:
      OLLAMA_KEEP_ALIVE: "5m"
    volumes:
      - /usr/share/ollama/.ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ainews-net

  comfyui:
    build:
      context: .
      dockerfile: docker/comfyui/Dockerfile
    container_name: plutonia-comfyui-1
    restart: unless-stopped
    gpus: all
    volumes:
      - /opt/plutonia/models:/comfyui/models
      - /var/lib/plutonia/comfyui/output:/comfyui/output
    ports:
      - "127.0.0.1:8188:8188"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8188/system_stats || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - ainews-net

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: plutonia-litellm-1
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ainews-net

  openclaw:
    container_name: plutonia-openclaw
    build:
      context: .
      dockerfile: docker/openclaw/Dockerfile
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
      comfyui:
        condition: service_healthy
    environment:
      SEARXNG_URL: http://searxng:8080
      OLLAMA_API_KEY: ollama-local
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_HOST: http://ollama:11434
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    volumes:
      - /home/python/.openclaw:/root/.openclaw
      - /var/lib/plutonia:/var/lib/plutonia
      - /var/backups/plutonia:/var/backups/plutonia
      - /var/log/plutonia:/var/log/plutonia
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:18789:18789"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18789/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ainews-net

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: plutonia-uptime-kuma-1
    restart: unless-stopped
    volumes:
      - /var/lib/plutonia/uptime-kuma:/app/data
    ports:
      - "127.0.0.1:3002:3001"
    networks:
      - ainews-net

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: plutonia-autoheal-1
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 60
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 10
      DOCKER_SOCK: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ainews-net

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./searxng:/etc/searxng:ro
      - searxng-cache:/var/cache/searxng
    networks:
      - ainews-net

  portal:
    build:
      context: .
      dockerfile: portal/Dockerfile
    container_name: ainews-portal
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - portal-staticfiles:/app/staticfiles
      - portal-logs:/app/logs
    ports:
      - "127.0.0.1:8010:8000"
    command: >
      sh -lc "python manage.py migrate &&
              python manage.py collectstatic --noinput &&
              python manage.py ensure_superuser &&
              gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ainews-net

  gmail-monitor:
    build:
      context: .
      dockerfile: portal/Dockerfile
    container_name: ainews-gmail-monitor
    expose:
      - "8001"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORTAL_API_URL: http://portal:8000/api/agent
      OLLAMA_HOST: http://ollama:11434
      SEARXNG_URL: http://searxng:8080
      LLM_BACKEND: ollama
      OPENCLAW_CONTAINER_NAME: plutonia-openclaw
      OPENCLAW_TIMEOUT_SECONDS: "240"
      OPENCLAW_FALLBACK_OLLAMA: "false"
      OPENCLAW_CONFIG_PATH: /openclaw-config/openclaw.json
      REVIEW_BEFORE_PUBLISH: "true"
      REVIEW_OUTPUT_DIR: /review
      REVIEW_SIGNATURE_REQUIRED: "true"
      REVIEW_SIGNATURE_MAX_AGE_SECONDS: "300"
      SIGN_REVIEW_AUTO_APPLY: "true"
      REVIEW_API_BASE: "http://127.0.0.1:8001"
      REVIEW_NEXT_NOTIFICATION_DELAY_SECONDS: "15"
      SOURCE_REWRITE_ENABLED: "true"
      SOURCE_REWRITE_MAX_CHARS: "12000"
      PARALLEL_INGEST_BATCH_SIZE: "5"
      ALLOWED_FORWARDER_EMAILS: carlos.santos@plutoanalytics.com
      GMAIL_EXCLUDED_LABELS: ""
      # --- Telegram bot with inline buttons (Fase 4) ---
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
      PORTAL_PUBLIC_BASE_URL: "${PORTAL_PUBLIC_BASE_URL:-}"
      TELEGRAM_TRIAGE_INTERVAL: "15"
      # --- Per-task model configuration (Fase 6) ---
      OLLAMA_MODEL_SUMMARY: "${OLLAMA_MODEL_SUMMARY:-qwen3:14b}"
      OLLAMA_MODEL_TITLE: "${OLLAMA_MODEL_TITLE:-qwen3:14b}"
      OLLAMA_MODEL_LINK_VALIDATION: "${OLLAMA_MODEL_LINK_VALIDATION:-qwen3:14b}"
      # --- Link validation thresholds (Fase 2) ---
      LINK_VALID_THRESHOLD: "${LINK_VALID_THRESHOLD:-0.75}"
      LINK_UNCERTAIN_THRESHOLD: "${LINK_UNCERTAIN_THRESHOLD:-0.45}"
      LINK_VALIDATION_TIMEOUT: "${LINK_VALIDATION_TIMEOUT:-60}"
    command: ["python", "/opt/ai-news-scripts/gmail_monitor.py", "--mode", "monitor"]
    volumes:
      - portal-logs:/logs
      - ./review:/review
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/python/.openclaw/openclaw.json:/openclaw-config/openclaw.json:ro
    depends_on:
      portal:
        condition: service_healthy
      openclaw:
        condition: service_healthy
    networks:
      - ainews-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ainews-cloudflared
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "--url", "http://nginx:80"]
    depends_on:
      nginx:
        condition: service_started
    networks:
      - ainews-net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ainews-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8089:80"
    volumes:
      - portal-staticfiles:/var/www/static:ro
    depends_on:
      portal:
        condition: service_started
    networks:
      - ainews-net

networks:
  ainews-net:
    external: true
    name: plutonia_default

volumes:
  portal-staticfiles:
  portal-logs:
  searxng-cache:
