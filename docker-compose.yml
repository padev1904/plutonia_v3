name: plutonia-ainews

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: plutonia-postgres-1
    restart: unless-stopped
    environment:
      POSTGRES_DB: plutonia
      POSTGRES_USER: python
      POSTGRES_PASSWORD: ${PLUTONIA_DB_PASSWORD:-}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U python -d plutonia"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ainews-net

  ollama:
    image: ollama/ollama:latest
    container_name: plutonia-ollama-1
    restart: unless-stopped
    gpus: all
    environment:
      OLLAMA_KEEP_ALIVE: "5m"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ainews-net

  comfyui:
    build:
      context: ./docker/comfyui
      dockerfile: Dockerfile
    container_name: plutonia-comfyui-1
    restart: unless-stopped
    gpus: all
    volumes:
      - comfyui-models:/comfyui/models
      - comfyui-output:/comfyui/output
    ports:
      - "127.0.0.1:8188:8188"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8188/system_stats || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - ainews-net

  litellm:
    build:
      context: .
      dockerfile: docker/litellm/Dockerfile
    container_name: plutonia-litellm-1
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ainews-net

  openclaw:
    container_name: plutonia-openclaw
    build:
      context: ./docker/openclaw
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
      comfyui:
        condition: service_healthy
    environment:
      SEARXNG_URL: http://searxng:8080
      OLLAMA_API_KEY: ollama-local
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_HOST: http://ollama:11434
      OPENCLAW_TELEGRAM_ENABLED: "${OPENCLAW_TELEGRAM_ENABLED:-false}"
      OPENCLAW_TELEGRAM_BOT_TOKEN: "${OPENCLAW_TELEGRAM_BOT_TOKEN:-}"
      OPENCLAW_TELEGRAM_ALLOW_FROM: "${OPENCLAW_TELEGRAM_ALLOW_FROM:-}"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN:-}"
      OPENCLAW_MODEL_ID: "${OPENCLAW_MODEL_ID:-qwen3:14b-16k}"
      OPENCLAW_MODEL_NAME: "${OPENCLAW_MODEL_NAME:-qwen3:14b-16k}"
      OPENCLAW_MODEL_CONTEXT_WINDOW: "${OPENCLAW_MODEL_CONTEXT_WINDOW:-16384}"
      OPENCLAW_MODEL_MAX_TOKENS: "${OPENCLAW_MODEL_MAX_TOKENS:-16384}"
      OPENCLAW_GATEWAY_REMOTE_URL: "${OPENCLAW_GATEWAY_REMOTE_URL:-ws://openclaw:18789}"
      PLUTONIA_REVIEW_API_BASE: "http://ainews-gmail-monitor:8001"
      REVIEW_SIGNATURE_SECRET: "${REVIEW_SIGNATURE_SECRET:-}"
    volumes:
      - openclaw-data:/root/.openclaw
    expose:
      - "18789"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18789/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ainews-net

  openclaw-ops:
    container_name: plutonia-openclaw-ops
    build:
      context: ./docker/openclaw
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      portal:
        condition: service_healthy
      gmail-monitor:
        condition: service_healthy
      ops-runner:
        condition: service_started
    environment:
      SEARXNG_URL: http://searxng:8080
      OLLAMA_API_KEY: ollama-local
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_HOST: http://ollama:11434
      OPS_API_TOKEN: "${OPS_API_TOKEN:-}"
      PLUTONIA_OPS_API_BASE: "http://ainews-gmail-monitor:8001"
      PLUTONIA_REVIEW_API_BASE: "http://ainews-gmail-monitor:8001"
      REVIEW_SIGNATURE_SECRET: "${REVIEW_SIGNATURE_SECRET:-}"
      OPENCLAW_TELEGRAM_ENABLED: "${OPENCLAW_OPS_TELEGRAM_ENABLED:-false}"
      OPENCLAW_TELEGRAM_BOT_TOKEN: "${OPENCLAW_OPS_TELEGRAM_BOT_TOKEN:-}"
      OPENCLAW_TELEGRAM_ALLOW_FROM: "${OPENCLAW_OPS_TELEGRAM_ALLOW_FROM:-}"
      OPENCLAW_TELEGRAM_GROUPS: "${OPENCLAW_OPS_TELEGRAM_GROUPS:-}"
      OPENCLAW_TELEGRAM_GROUP_ALLOW_FROM: "${OPENCLAW_OPS_TELEGRAM_GROUP_ALLOW_FROM:-}"
      OPENCLAW_TELEGRAM_DM_POLICY: "${OPENCLAW_OPS_TELEGRAM_DM_POLICY:-allowlist}"
      OPENCLAW_TELEGRAM_GROUP_POLICY: "${OPENCLAW_OPS_TELEGRAM_GROUP_POLICY:-allowlist}"
      OPENCLAW_TELEGRAM_REQUIRE_MENTION: "${OPENCLAW_OPS_TELEGRAM_REQUIRE_MENTION:-true}"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_OPS_GATEWAY_TOKEN:-${OPENCLAW_GATEWAY_TOKEN:-}}"
      OPENCLAW_GATEWAY_REMOTE_URL: "${OPENCLAW_OPS_GATEWAY_REMOTE_URL:-ws://openclaw-ops:18790}"
      OPENCLAW_GATEWAY_BIND: "${OPENCLAW_OPS_GATEWAY_BIND:-lan}"
      OPENCLAW_GATEWAY_CONTROL_UI_ALLOW_HOST_HEADER_FALLBACK: "${OPENCLAW_OPS_GATEWAY_CONTROL_UI_ALLOW_HOST_HEADER_FALLBACK:-true}"
      OPENCLAW_MULTI_AGENT_ENABLED: "${OPENCLAW_OPS_MULTI_AGENT_ENABLED:-true}"
      OPENCLAW_MODEL_ID: "${OPENCLAW_OPS_MODEL_ID:-qwen3.5:9b}"
      OPENCLAW_MODEL_NAME: "${OPENCLAW_OPS_MODEL_NAME:-qwen3.5:9b}"
      OPENCLAW_MODEL_CONTEXT_WINDOW: "${OPENCLAW_OPS_MODEL_CONTEXT_WINDOW:-8192}"
      OPENCLAW_MODEL_MAX_TOKENS: "${OPENCLAW_OPS_MODEL_MAX_TOKENS:-8192}"
      OPENCLAW_CONTROLLER_MODEL_ID: "${OPENCLAW_OPS_CONTROLLER_MODEL_ID:-qwen3.5:9b}"
      OPENCLAW_CONTROLLER_MODEL_NAME: "${OPENCLAW_OPS_CONTROLLER_MODEL_NAME:-qwen3.5:9b}"
      OPENCLAW_CONTROLLER_MODEL_CONTEXT_WINDOW: "${OPENCLAW_OPS_CONTROLLER_MODEL_CONTEXT_WINDOW:-8192}"
      OPENCLAW_CONTROLLER_MODEL_MAX_TOKENS: "${OPENCLAW_OPS_CONTROLLER_MODEL_MAX_TOKENS:-8192}"
      OPENCLAW_CODER_MODEL_ID: "${OPENCLAW_OPS_CODER_MODEL_ID:-qwen3-coder:latest}"
      OPENCLAW_CODER_MODEL_NAME: "${OPENCLAW_OPS_CODER_MODEL_NAME:-qwen3-coder:latest}"
      OPENCLAW_CODER_MODEL_CONTEXT_WINDOW: "${OPENCLAW_OPS_CODER_MODEL_CONTEXT_WINDOW:-32768}"
      OPENCLAW_CODER_MODEL_MAX_TOKENS: "${OPENCLAW_OPS_CODER_MODEL_MAX_TOKENS:-32768}"
      OPENCLAW_REVIEWER_MODEL_ID: "${OPENCLAW_OPS_REVIEWER_MODEL_ID:-qwen3.5:9b}"
      OPENCLAW_REVIEWER_MODEL_NAME: "${OPENCLAW_OPS_REVIEWER_MODEL_NAME:-qwen3.5:9b}"
      OPENCLAW_REVIEWER_MODEL_CONTEXT_WINDOW: "${OPENCLAW_OPS_REVIEWER_MODEL_CONTEXT_WINDOW:-8192}"
      OPENCLAW_REVIEWER_MODEL_MAX_TOKENS: "${OPENCLAW_OPS_REVIEWER_MODEL_MAX_TOKENS:-8192}"
      OPENCLAW_EDITORIAL_MODEL_ID: "${OPENCLAW_OPS_EDITORIAL_MODEL_ID:-qwen3:14b-16k}"
      OPENCLAW_EDITORIAL_MODEL_NAME: "${OPENCLAW_OPS_EDITORIAL_MODEL_NAME:-qwen3:14b-16k}"
      OPENCLAW_EDITORIAL_MODEL_CONTEXT_WINDOW: "${OPENCLAW_OPS_EDITORIAL_MODEL_CONTEXT_WINDOW:-16384}"
      OPENCLAW_EDITORIAL_MODEL_MAX_TOKENS: "${OPENCLAW_OPS_EDITORIAL_MODEL_MAX_TOKENS:-16384}"
      OPENCLAW_ROUTER_MODEL_ID: "${OPENCLAW_OPS_ROUTER_MODEL_ID:-qwen3.5:9b}"
      OPENCLAW_ROUTER_MODEL_NAME: "${OPENCLAW_OPS_ROUTER_MODEL_NAME:-qwen3.5:9b}"
      OPENCLAW_ROUTER_MODEL_CONTEXT_WINDOW: "${OPENCLAW_OPS_ROUTER_MODEL_CONTEXT_WINDOW:-8192}"
      OPENCLAW_ROUTER_MODEL_MAX_TOKENS: "${OPENCLAW_OPS_ROUTER_MODEL_MAX_TOKENS:-8192}"
      OPENCLAW_AGENT_TIMEOUT_SECONDS: "${OPENCLAW_OPS_TIMEOUT_SECONDS:-1800}"
      OPENCLAW_AGENT_WORKSPACE: /workspace
      OPENCLAW_BOOTSTRAP_REPO_URL: "${OPENCLAW_OPS_REPO_URL:-https://github.com/padev1904/plutonia_v3.git}"
      OPENCLAW_BOOTSTRAP_REPO_BRANCH: "${OPENCLAW_OPS_REPO_BRANCH:-main}"
      OPENCLAW_BOOTSTRAP_REPO_DEPTH: "${OPENCLAW_OPS_REPO_DEPTH:-0}"
      OPENCLAW_BOOTSTRAP_REPO_AUTO_UPDATE: "${OPENCLAW_OPS_REPO_AUTO_UPDATE:-true}"
      OPENCLAW_BOOTSTRAP_REPO_DIR: /workspace/repo
      OPENCLAW_TOOLS_PROFILE: "${OPENCLAW_OPS_TOOLS_PROFILE:-coding}"
      OPENCLAW_GIT_AUTHOR_NAME: "${OPENCLAW_OPS_GIT_AUTHOR_NAME:-OpenClaw Ops}"
      OPENCLAW_GIT_AUTHOR_EMAIL: "${OPENCLAW_OPS_GIT_AUTHOR_EMAIL:-openclaw-ops@plutonia.local}"
      OPENCLAW_GIT_PUSH_REMOTE: "${OPENCLAW_OPS_GIT_PUSH_REMOTE:-origin}"
      OPENCLAW_GIT_PUSH_BRANCH: "${OPENCLAW_OPS_GIT_PUSH_BRANCH:-main}"
      OPENCLAW_GIT_PUSH_URL: "${OPENCLAW_OPS_GIT_PUSH_URL:-}"
      OPENCLAW_GITHUB_PUSH_TOKEN: "${OPENCLAW_OPS_GITHUB_PUSH_TOKEN:-}"
      OPENCLAW_GITHUB_PUSH_USERNAME: "${OPENCLAW_OPS_GITHUB_PUSH_USERNAME:-x-access-token}"
      OPS_RUNNER_BASE_URL: "http://ops-runner:8011"
      OPS_RUNNER_TOKEN: "${OPS_RUNNER_TOKEN:-${OPS_API_TOKEN:-}}"
      OPENCLAW_WEB_FETCH_ENABLED: "${OPENCLAW_OPS_WEB_FETCH_ENABLED:-true}"
      OPENCLAW_WEB_SEARCH_ENABLED: "${OPENCLAW_OPS_WEB_SEARCH_ENABLED:-true}"
      OPENCLAW_WEB_SEARCH_PROVIDER: "${OPENCLAW_OPS_WEB_SEARCH_PROVIDER:-}"
      OPENCLAW_WEB_SEARCH_API_KEY: "${OPENCLAW_OPS_WEB_SEARCH_API_KEY:-}"
      PORTAL_PUBLIC_BASE_URL: "${PORTAL_PUBLIC_BASE_URL:-}"
    command: ["/usr/local/bin/openclaw", "gateway", "--bind", "lan", "--port", "18790"]
    volumes:
      - openclaw-ops-data:/root/.openclaw
      - openclaw-ops-workspace:/workspace
      - review-data:/review
      - portal-logs:/logs
    expose:
      - "18790"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18790/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - ainews-net

  ops-runner:
    container_name: plutonia-ops-runner
    build:
      context: .
      dockerfile: docker/ops-runner/Dockerfile
    restart: unless-stopped
    environment:
      OPS_RUNNER_TOKEN: "${OPS_RUNNER_TOKEN:-${OPS_API_TOKEN:-}}"
      OPS_RUNNER_REPO_DIR: /srv/live-repo
      OPS_RUNNER_COMPOSE_FILE: /srv/live-repo/docker-compose.yml
      OPS_RUNNER_LOG_DIR: /logs
      OPS_RUNNER_LIVE_BRANCH: "${OPS_RUNNER_LIVE_BRANCH:-main}"
      OPS_RUNNER_REQUIRE_PUSHED_HEAD: "${OPS_RUNNER_REQUIRE_PUSHED_HEAD:-true}"
      OPS_RUNNER_ALLOWED_SERVICES: "${OPS_RUNNER_ALLOWED_SERVICES:-portal,gmail-monitor,openclaw-ops,openclaw,ops-runner,nginx,litellm,searxng}"
      OPS_RUNNER_DEPLOY_TIMEOUT_SECONDS: "${OPS_RUNNER_DEPLOY_TIMEOUT_SECONDS:-1800}"
      OPS_RUNNER_GIT_TIMEOUT_SECONDS: "${OPS_RUNNER_GIT_TIMEOUT_SECONDS:-120}"
    volumes:
      - type: bind
        source: .
        target: /srv/live-repo
      - portal-logs:/logs
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "8011"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8011/healthz >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ainews-net

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: plutonia-uptime-kuma-1
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    ports:
      - "127.0.0.1:3002:3001"
    networks:
      - ainews-net

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: plutonia-autoheal-1
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 60
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 10
      DOCKER_SOCK: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ainews-net

  searxng:
    build:
      context: .
      dockerfile: docker/searxng/Dockerfile
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - searxng-config:/etc/searxng
      - searxng-cache:/var/cache/searxng
    networks:
      - ainews-net

  portal:
    build:
      context: .
      dockerfile: portal/Dockerfile
    container_name: ainews-portal
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - portal-staticfiles:/app/staticfiles
      - portal-logs:/app/logs
    ports:
      - "127.0.0.1:8010:8000"
    command: >
      sh -lc "python manage.py migrate &&
              python manage.py collectstatic --noinput &&
              python manage.py ensure_superuser &&
              gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ainews-net

  gmail-monitor:
    build:
      context: .
      dockerfile: docker/gmail-monitor/Dockerfile
    container_name: ainews-gmail-monitor
    expose:
      - "8001"
    restart: unless-stopped
    labels:
      autoheal: "true"
      all: "true"
    env_file:
      - .env
    environment:
      PORTAL_API_URL: http://portal:8000/api/agent
      OLLAMA_HOST: http://ollama:11434
      SEARXNG_URL: http://searxng:8080
      LLM_BACKEND: ollama
      OPENCLAW_GATEWAY_URL: "${OPENCLAW_GATEWAY_URL:-ws://openclaw-ops:18790}"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN:-${OPENCLAW_OPS_GATEWAY_TOKEN:-}}"
      OPENCLAW_GATEWAY_PASSWORD: "${OPENCLAW_GATEWAY_PASSWORD:-}"
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-1}"
      OPENCLAW_CONFIG_PATH: /root/.openclaw/openclaw.json
      OPENCLAW_TIMEOUT_SECONDS: "240"
      OPENCLAW_FALLBACK_OLLAMA: "false"
      OPENCLAW_SINGLE_SPOC: "${OPENCLAW_SINGLE_SPOC:-true}"
      REVIEW_BEFORE_PUBLISH: "true"
      REVIEW_TELEGRAM_NOTIFY: "${REVIEW_TELEGRAM_NOTIFY:-false}"
      WATCHDOG_TELEGRAM_NOTIFY: "${WATCHDOG_TELEGRAM_NOTIFY:-false}"
      EDITORIAL_TELEGRAM_NOTIFY: "${EDITORIAL_TELEGRAM_NOTIFY:-false}"
      REVIEW_OUTPUT_DIR: /review
      REVIEW_SIGNATURE_REQUIRED: "true"
      REVIEW_SIGNATURE_MAX_AGE_SECONDS: "300"
      SIGN_REVIEW_AUTO_APPLY: "true"
      REVIEW_API_BASE: "http://127.0.0.1:8001"
      REVIEW_NEXT_NOTIFICATION_DELAY_SECONDS: "15"
      SOURCE_REWRITE_ENABLED: "true"
      SOURCE_REWRITE_MAX_CHARS: "12000"
      PARALLEL_INGEST_BATCH_SIZE: "1"
      ALLOWED_FORWARDER_EMAILS: carlos.santos@plutoanalytics.com
      GMAIL_EXCLUDED_LABELS: "Pending,Published,Partial,Rejected"
      # --- Telegram bot with inline buttons (Fase 4) ---
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-${OPENCLAW_OPS_TELEGRAM_BOT_TOKEN:-}}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-${OPENCLAW_OPS_TELEGRAM_ALLOW_FROM:-}}"
      PORTAL_PUBLIC_BASE_URL: "${PORTAL_PUBLIC_BASE_URL:-}"
      TELEGRAM_TRIAGE_NEWSLETTER_ID: "${TELEGRAM_TRIAGE_NEWSLETTER_ID:-}"
      CLOUDFLARED_CONTAINER_NAME: "${CLOUDFLARED_CONTAINER_NAME:-ainews-cloudflared}"
      TELEGRAM_TRIAGE_INTERVAL: "15"
      TELEGRAM_INLINE_BOT_ENABLED: "${TELEGRAM_INLINE_BOT_ENABLED:-true}"
      # --- Per-task model configuration (Fase 6) ---
      OLLAMA_MODEL_SUMMARY: "${OLLAMA_MODEL_SUMMARY:-qwen3:14b}"
      OLLAMA_MODEL_TITLE: "${OLLAMA_MODEL_TITLE:-qwen3:14b}"
      OLLAMA_MODEL_LINK_VALIDATION: "${OLLAMA_MODEL_LINK_VALIDATION:-qwen3:14b}"
      # --- Link validation thresholds (Fase 2) ---
      LINK_VALID_THRESHOLD: "${LINK_VALID_THRESHOLD:-0.75}"
      LINK_UNCERTAIN_THRESHOLD: "${LINK_UNCERTAIN_THRESHOLD:-0.45}"
      LINK_VALIDATION_TIMEOUT: "${LINK_VALIDATION_TIMEOUT:-60}"
      MONITOR_HEALTHCHECK_STARTUP_GRACE_SECONDS: "${MONITOR_HEALTHCHECK_STARTUP_GRACE_SECONDS:-180}"
      MONITOR_HEALTHCHECK_STALE_SECONDS: "${MONITOR_HEALTHCHECK_STALE_SECONDS:-180}"
      MONITOR_HEALTHCHECK_FAILURES_BEFORE_RESTART: "${MONITOR_HEALTHCHECK_FAILURES_BEFORE_RESTART:-2}"
      MONITOR_SUPERVISOR_POLL_SECONDS: "${MONITOR_SUPERVISOR_POLL_SECONDS:-15}"
      OPS_API_TOKEN: "${OPS_API_TOKEN:-}"
    command: ["python", "/app/scripts/gmail_monitor_supervisor.py", "--", "python", "/app/scripts/gmail_monitor.py", "--mode", "monitor"]
    volumes:
      - portal-logs:/logs
      - review-data:/review
      - type: volume
        source: openclaw-data
        target: /root/.openclaw
        read_only: false
    healthcheck:
      test: ["CMD", "python", "/app/scripts/gmail_monitor_healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    depends_on:
      portal:
        condition: service_healthy
      openclaw:
        condition: service_healthy
    networks:
      - ainews-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ainews-cloudflared
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "--url", "http://nginx:80"]
    depends_on:
      nginx:
        condition: service_started
    networks:
      - ainews-net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ainews-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8089:80"
    volumes:
      - portal-staticfiles:/var/www/static:ro
    depends_on:
      portal:
        condition: service_started
    networks:
      - ainews-net

networks:
  ainews-net:
    external: true
    name: plutonia_default

volumes:
  postgres-data:
  ollama-data:
  comfyui-models:
  comfyui-output:
  uptime-kuma-data:
  portal-staticfiles:
  portal-logs:
  review-data:
  openclaw-data:
  openclaw-ops-data:
  openclaw-ops-workspace:
  searxng-config:
  searxng-cache:
